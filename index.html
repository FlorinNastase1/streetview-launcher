<style>*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif}body{background:#eee;display:flex;align-items:center;justify-content:center;min-height:100vh}.c{background:#fff;border-radius:8px;padding:1rem;width:360px}.r{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:.5rem 0}label{font-size:11px;font-weight:700;color:#555;text-transform:uppercase}input{width:100%;height:34px;border:1px solid #ccc;border-radius:5px;padding:0 7px;font-size:13px;font-family:monospace}.mb{display:flex;gap:4px;margin:.5rem 0}button{cursor:pointer;font-size:12px}.tb{flex:1;height:28px;border:1px solid #ccc;border-radius:5px;background:#fff}.a{border-color:#185FA5;background:#deeaf7;color:#185FA5;font-weight:700}.gb{width:100%;height:38px;background:#185FA5;border:none;border-radius:6px;color:#fff;font-size:14px;font-weight:700}.res{margin-top:.6rem;padding:8px;background:#f5f5f5;border-radius:5px;display:none;font-size:11px}.ra{color:#185FA5;word-break:break-all}.e{border-color:red}</style>
<div class="c"><b>📍 Street View Launcher</b><br><small>Paste coords from Coordinates widget</small>
<div class="r"><div><label>Lat</label><input id="la" placeholder="44.4268"></div><div><label>Lon</label><input id="lo" placeholder="26.1025"></div></div>
<div class="mb"><button class="tb a" onclick="m('sv',this)">Street View</button><button class="tb" onclick="m('gm',this)">Maps</button><button class="tb" onclick="m('bo',this)">Both</button></div>
<button class="gb" onclick="go()">Generate &amp; Open ↗</button>
<div class="res" id="rb"><div id="ri"></div><br><button class="tb" onclick="cp()" id="cb" style="width:80px">Copy</button> <button class="tb" onclick="cl()" style="width:80px">Clear</button></div></div>
<script>var md='sv',lk=[];function m(v,el){md=v;document.querySelectorAll('.tb').forEach(b=>b.classList.remove('a'));el.classList.add('a')}function go(){var a=parseFloat(document.getElementById('la').value.replace(',','.')),b=parseFloat(document.getElementById('lo').value.replace(',','.'));if(isNaN(a)||isNaN(b)||a<-90||a>90||b<-180||b>180){alert('Invalid coordinates');return}var u1='https://www.google.com/maps/@?api=1&map_action=pano&viewpoint='+a+','+b,u2='https://www.google.com/maps/search/?api=1&query='+a+','+b;lk=md=='sv'?[u1]:md=='gm'?[u2]:[u1,u2];var h=lk.map((u,i)=>'<div style="margin-top:'+(i?8:0)+'px"><b>'+(lk.length>1?['Street View','Maps'][i]:'Link')+'</b><br><a class="ra" href="'+u+'" target="_blank">'+u+'</a></div>').join('');document.getElementById('ri').innerHTML=h;document.getElementById('rb').style.display='block';lk.forEach((u,i)=>setTimeout(()=>window.open(u,'_blank'),i*400))}function cp(){navigator.clipboard.writeText(lk.join('\n')).then(()=>{var b=document.getElementById('cb');b.textContent='Copied!';setTimeout(()=>b.textContent='Copy',1500)})}function cl(){document.getElementById('la').value='';document.getElementById('lo').value='';document.getElementById('rb').style.display='none';lk=[]}</script>
